<svg xmlns="http://www.w3.org/2000/svg" width="2436" height="1020" viewBox="0 0 2436 1020" font-family="'Avenir Next','Futura','Helvetica Neue',Arial,sans-serif">
  <defs>
    <!-- background gradients -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e24"/>
      <stop offset="0.55" stop-color="#0e1330"/>
      <stop offset="1" stop-color="#171a42"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.16" cy="0.62" r="0.5">
      <stop offset="0" stop-color="#3a3f8f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a3f8f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.78" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#4b3f8f" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4b3f8f" stop-opacity="0"/>
    </radialGradient>

    <!-- title gradients -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7A45"/>
      <stop offset="0.34" stop-color="#FF9E6B"/>
      <stop offset="0.62" stop-color="#6FB4F7"/>
      <stop offset="1" stop-color="#4F8FF7"/>
    </linearGradient>
    <linearGradient id="shieldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d8bff"/>
      <stop offset="1" stop-color="#52e0c4"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5560c8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2b2f66" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bcd4ff"/>
      <stop offset="1" stop-color="#7d8bff"/>
    </linearGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="softbig" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="2436" height="1020" fill="url(#bg)"/>
  <rect width="2436" height="1020" fill="url(#glowL)"/>
  <rect width="2436" height="1020" fill="url(#glowR)"/>

  <!-- faint circuit traces -->
  <g stroke="#3a64a0" stroke-width="2" fill="none" opacity="0.22">
    <path d="M150 150 H470 V250"/>
    <path d="M120 700 H360 V640"/>
    <path d="M1980 200 H1720 V300"/>
    <path d="M2050 720 V860 H1820"/>
    <circle cx="470" cy="250" r="6" fill="#3a64a0" stroke="none"/>
    <circle cx="1720" cy="300" r="6" fill="#3a64a0" stroke="none"/>
    <circle cx="1100" cy="190" r="6" fill="#3a64a0" stroke="none"/>
    <circle cx="980" cy="840" r="6" fill="#3a64a0" stroke="none"/>
  </g>

  <!-- binary decorations -->
  <g font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-weight="600" fill="#4f7fb0">
    <text x="150" y="160" font-size="40" opacity="0.55">0110</text>
    <text x="200" y="930" font-size="44" opacity="0.5">1001</text>
    <text x="2060" y="160" font-size="40" opacity="0.6" text-anchor="end">01001100</text>
    <text x="2060" y="215" font-size="40" opacity="0.6" text-anchor="end">11000101</text>
    <text x="2060" y="880" font-size="40" opacity="0.55" text-anchor="end">10110010</text>
    <text x="2060" y="935" font-size="40" opacity="0.55" text-anchor="end">01011001</text>
  </g>

  <!-- ===== LEFT: glowing shield with scanner (magnifying glass) ===== -->
  <g transform="translate(300 500)">
    <!-- shield -->
    <path id="shield" d="M0 -250 L165 -185 V40 C165 165 95 245 0 290 C-95 245 -165 165 -165 40 V-185 Z"
          fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="7" filter="url(#soft)" opacity="0.85"/>
    <path d="M0 -250 L165 -185 V40 C165 165 95 245 0 290 C-95 245 -165 165 -165 40 V-185 Z"
          fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="6"/>
    <!-- scan grid inside shield -->
    <g stroke="#7d8bff" stroke-width="2" opacity="0.18">
      <path d="M-150 -120 H150 M-150 -40 H150 M-150 40 H150 M-150 120 H150"/>
    </g>
    <!-- magnifying glass (scanner motif) -->
    <g filter="url(#soft)" opacity="0.9">
      <circle cx="-18" cy="-25" r="92" fill="#0b1020" fill-opacity="0.55" stroke="url(#glassStroke)" stroke-width="13"/>
      <line x1="52" y1="48" x2="128" y2="128" stroke="url(#glassStroke)" stroke-width="22" stroke-linecap="round"/>
    </g>
    <circle cx="-18" cy="-25" r="92" fill="#0b1020" fill-opacity="0.65" stroke="url(#glassStroke)" stroke-width="11"/>
    <line x1="52" y1="48" x2="130" y2="130" stroke="url(#glassStroke)" stroke-width="20" stroke-linecap="round"/>
    <!-- checkmark inside the lens -->
    <path d="M-58 -25 L-30 5 L28 -62" fill="none" stroke="#52e0c4" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== terminal window icon ===== -->
  <g transform="translate(485 248)">
    <rect x="0" y="0" width="300" height="210" rx="22" fill="#0c1228" stroke="#5b86d6" stroke-width="6"/>
    <line x1="0" y1="52" x2="300" y2="52" stroke="#5b86d6" stroke-width="4" opacity="0.7"/>
    <circle cx="34" cy="26" r="9" fill="#ff7a59"/>
    <circle cx="68" cy="26" r="9" fill="#f5c451"/>
    <circle cx="102" cy="26" r="9" fill="#52e0c4"/>
    <text x="34" y="150" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="58" font-weight="700" fill="#52e0c4">&gt;_</text>
    <rect x="150" y="128" width="110" height="14" rx="7" fill="#5b86d6"/>
  </g>

  <!-- ===== CENTER: title ===== -->
  <g>
    <text x="845" y="375" font-size="154" font-weight="800" letter-spacing="22" fill="#ffffff">AGENT</text>
    <text x="845" y="588" font-size="196" font-weight="800" letter-spacing="4" fill="url(#scanGrad)">SCANNER</text>
    <text x="850" y="708" font-size="53" font-weight="600" letter-spacing="1.5" fill="#aeb9dc">Static Security Scanner for Claude Code <tspan fill="#6ea0f0" font-weight="700">· 28 checks</tspan></text>
    <text x="850" y="818" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="46" font-weight="500" letter-spacing="1" fill="#6f7aa3">github.com/jassics/agentscanner</text>
  </g>

  <!-- ===== RIGHT: node graph ===== -->
  <g transform="translate(2160 470)" stroke-linecap="round">
    <g stroke="#52e0c4" stroke-width="4" opacity="0.8">
      <line x1="-110" y1="-120" x2="120" y2="60"/>
      <line x1="120" y1="-120" x2="-110" y2="60"/>
      <line x1="-110" y1="-120" x2="120" y2="-120"/>
      <line x1="-110" y1="60" x2="0" y2="160"/>
      <line x1="120" y1="60" x2="0" y2="160"/>
      <line x1="0" y1="-30" x2="120" y2="-120"/>
      <line x1="0" y1="-30" x2="-110" y2="60"/>
    </g>
    <g fill="#0c1228" stroke="#52e0c4" stroke-width="5">
      <circle cx="-110" cy="-120" r="22"/>
      <circle cx="120" cy="-120" r="22"/>
      <circle cx="0" cy="-30" r="26"/>
      <circle cx="-110" cy="60" r="22"/>
      <circle cx="120" cy="60" r="22"/>
      <circle cx="0" cy="160" r="22"/>
    </g>
  </g>
</svg>
